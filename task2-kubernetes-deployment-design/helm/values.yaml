replicaCount: 2

image:
  repository: springboot-demo
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  host: springboot-demo.local
  path: /

config:
  springProfile: production
  kafkaBootstrapServers: kafka:9092
  databaseHost: postgres
  databaseName: pricing

secret:
  databaseUsername: pricing_user
  databasePassword: change-me

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

probes:
  readinessPath: /actuator/health
  livenessPath: /actuator/health